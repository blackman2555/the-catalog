<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Teia Music Mosaic OBJKT</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <h1 class="title">Teia Music Mosaic</h1>
        <p class="subtitle">Tagged releases by one minter. Click any cover to play or pause.</p>
      </div>
      <div class="controls">
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </header>
    <div id="status" class="status">Loading...</div>
    <section id="grid" class="collage" aria-label="Top tracks mosaic collage"></section>
    <section id="catalogMore" class="catalog-more" aria-label="More tracks in catalog" hidden></section>
    <p class="hint">Tip: this interactive OBJKT refreshes to include new tagged mints from the configured wallet.</p>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
